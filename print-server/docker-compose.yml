services:
  print-server:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    # Environment variables — values are read from the shell or from the .env
    # file loaded by env_file below. Declaring them here ensures they are always
    # forwarded to the container even when set as shell variables at runtime
    # (e.g. PORT=4000 docker compose up).
    environment:
      - PORT=${PORT:-3001}
      - PRINT_SERVER_NAME=${PRINT_SERVER_NAME:-ESC/POS Print Server}
      - PRINT_SERVER_API_KEY=${PRINT_SERVER_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    env_file:
      - path: .env
        required: false
    # Mount printers.config.js so it can be edited without rebuilding the image.
    volumes:
      - ./printers.config.js:/app/printers.config.js:ro
    # ── USB / parallel-port printers ────────────────────────────────────────
    # If you use a `type: 'file'` printer (e.g. /dev/usb/lp0), grant the
    # container access to the host device by uncommenting the lines below and
    # adjusting the device path.
    #
    # devices:
    #   - /dev/usb/lp0:/dev/usb/lp0
